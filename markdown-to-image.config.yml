# Stable defaults for markdown-to-image (RedNote / X slides).
#
# Output layout (both platforms):
#   {output_root}/{YYYY}/{MM}/{source_stem}/
# where YYYY/MM come from the article path content/docs/YYYY/MM/,
# and source_stem is the article filename without .md.
#
# Examples:
#   static/red-images/2026/07/2026-07-12-di-tie-ri-ji-chu-du-tuo-si-tuo-ye-fu-si/
#   static/x-images/2026/07/2026-07-12-di-tie-ri-ji-chu-du-tuo-si-tuo-ye-fu-si/
#
# Non-article assets (series-a/, root PNGs, etc.) stay at the platform root.

output_roots:
  rednote: static/red-images
  x: static/x-images

nickname: 我要改名叫嘟嘟
bio: 一个用文字分享生活和读书感悟的程序员
chars_per_slide: 340
default_cta: reading
cta_mapping:
  reading:
    - yue-du-shu-mu
    - du-shu
    - shu-zhong-jin-ju-fen-xiang
    - jin-ba-duo-pu-tong-xin-li-xue
  summary:
    - summary
    - zong-jie
  life:
    - life
    - sheng-huo-ri-ji
    - di-tie-ri-ji
    - 30-fen-zhong-ri-ji
    - xue-zuo-cai
    - jie-hun-zhe-jian-shi
    - qin-mi-guan-xi
    - shen-zhen
    - zhi-chang-jing-li
    - ji-shu-bo-ke
