- month: 2026-07
  text: 继续《亲密关系》读书笔记的梳理？我做不到，我脑子里全是外星人，我脑子里的疑问全关于意识如何形成，全关于意识是否可以独立于躯体存在。
  source_title: 读《外星人访谈录》后遗症
  source_path: "/docs/2026/07/2026-07-02-di-tie-ri-ji-du-wai-xing-ren-fang-tan-lu-hou/"
  source_date: '2026-07-02'
- month: 2026-06
  text: 除去惊佩之外，我还从特斯拉自传中再一次夯实两条关于人生建议的认知：多读书，以及基于热爱的持续前行。
  source_title: 特斯拉与外星人
  source_path: "/docs/2026/06/2026-06-26-yue-du-shu-mu-te-si-la-yu-wai-xing-ren/"
  source_date: '2026-06-26'
- month: 2026-05
  text: 总之是，保持在场，充满热情且不间断的去生活、读书、写作；惊喜，是真的会来到的。
  source_title: "“10w阅读”是怎样体验，以及写出一篇能挣多少钱"
  source_path: "/docs/2026/05/2026-05-26-di-tie-ri-ji-10w-yue-du-shi-zen-yang/"
  source_date: '2026-05-26'
- month: 2026-04
  text: 第三层境界，是完全的自我，是完全自由地阅读，书本，只是这世界存在的另一种现象，恰似云的飞过，树叶的青绿与飘落。
  source_title: 读《阅读是安静的自我觉醒》，记读书的三层境界
  source_path: "/docs/2026/04/2026-04-26-yue-du-shu-mu-du-yue-du-shi-an-jing-de-zi/"
  source_date: '2026-04-26'
- month: 2026-03
  text: 我身上所发生的一切快乐、苦痛、希望、悲伤，都是过往的重复，我的生活我的人生最好部分，永远是现在，我不追忆过去，我不焦虑未来。
  source_title: "“坚持看书的习惯给你带来了什么好处？”"
  source_path: "/docs/2026/03/2026-03-14-zong-jie-jian-chi-kan-shu-de-xi-guan-gei/"
  source_date: '2026-03-14'
- month: 2026-02
  text: 四季度无大事，只日常的积攒依旧，读书、写作，以及认真生活。
  source_title: 25年第4季度，积攒依旧
  source_path: "/docs/2026/02/2026-02-07-zong-jie-25-nian-di-4-ji-du-ji/"
  source_date: '2026-02-07'
- month: 2026-01
  text: 每次看，我内心都生出许许多多好奇，以及一种“自己是极其渺小的”感受。
  source_title: 读《群星的法则》，越读疑问越多
  source_path: "/docs/2026/01/2026-01-18-yue-du-shu-mu-du-qun-xing-de-fa-ze-yue-du/"
  source_date: '2026-01-18'
- month: 2025-12
  text: 最后，我发现读书选择类别这件事于我，大概也算是某种持续阅读的动力，不同书籍带给我的，是不一样的新奇体验。
  source_title: 读《初老的女人》，依然是简单的生活
  source_path: "/docs/2025/12/2025-12-14-yue-du-shu-mu-du-chu-lao-de-nv-ren-yi-ran/"
  source_date: '2025-12-14'
- month: 2025-11
  text: 虽然忘记的内容无限多，但我确确实实是一直保持着阅读习惯的，我依然在那些能够自己安排的时间，找自己喜欢的书来看。
  source_title: 一个大龄程序员的地铁日记（第四期），卸载《皇室战争》之后
  source_path: "/docs/2025/11/2025-11-22-di-tie-ri-ji-yi-ge-da-ling-cheng-xu-yuan-de/"
  source_date: '2025-11-22'
- month: 2025-10
  text: 三季度，冥想有被我坚持下来，每日冥想时间冥想时长虽不固定，但我似乎开始知道自己在做什么了。
  source_title: 25年第3季度，当随心所欲过了头
  source_path: "/docs/2025/10/2025-10-19-zong-jie-25-nian-di-3-ji-du-dang/"
  source_date: '2025-10-19'
- month: 2025-09
  text: 最近几天听到读到的内容都关于朋友。关于朋友关于友谊，我之前已经理过好几篇更新阐述我感受到的友谊带给我的满足、快乐以及幸福。
  source_title: 来自于《亲密关系》的“朋友远比我们认为的更重要”
  source_path: "/docs/2025/09/2025-09-02-qin-mi-guan-xi-lai-zi-yu-qin-mi-guan-xi-de/"
  source_date: '2025-09-02'
- month: 2025-08
  text: 我的出路，是就一份自己喜欢的工作——我喜欢自己当前的工作——好好工作，工作之余看看书写写东西，看书不分类别，写作不博眼球，再坚持个三五年，再说。
  source_title: 程序员找“出路”之写作读书满五年
  source_path: "/docs/2025/08/2025-08-31-zong-jie-cheng-xu-yuan-zhao-chu-lu-zhi-xie/"
  source_date: '2025-08-31'
- month: 2025-07
  text: 这样的吃饭体验，在吃饭当时以及结束之后的一段时间，我都感受到一种宁静。
  source_title: 读《十分钟冥想》，收获一种超简单的放松方法
  source_path: "/docs/2025/07/2025-07-27-yue-du-shu-mu-du-shi-fen-zhong-ming-xiang-shou-huo/"
  source_date: '2025-07-27'
- month: 2025-06
  text: 虽然是远程办公，但我和好几位小伙伴都保有不错关系，我们工作中配合无间，私下也会互通有无。对的，我想自己，已经又在工作中交到几位好朋友。
  source_title: 25年第二季度，再换新工作，似乎一点纠结也没有的
  source_path: "/docs/2025/06/2025-06-29-zong-jie-25-nian-di-er-ji-du-zai/"
  source_date: '2025-06-29'
- month: 2025-05
  text: "《受戒》，是汪曾祺先生的小小说，我看过不下五六七八遍，每一遍读完，我内心都感觉满满的，我喜欢英子和明海的简单爱情。"
  source_title: 推荐一批近20年间看过，现在依然认为很不错的小说
  source_path: "/docs/2025/05/2025-05-11-zong-jie-tui-jian-yi-pi-jin-20-nian/"
  source_date: '2025-05-11'
- month: 2025-04
  text: 简单些说，读书于我的意义之一，是给予我生命以持久不歇的希望。
  source_title: 我感恩国泰民安~
  source_path: "/docs/2025/04/2025-04-20-30-fen-zhong-ri-ji-wo-gan-en-guo-tai-min-an/"
  source_date: '2025-04-20'
- month: 2025-03
  text: 我每天总是有时间在很认真干活的，那认真且拥有专注的时刻给予我满足感受。
  source_title: 头顶有飞机飞过
  source_path: "/docs/2025/03/2025-03-15-30-fen-zhong-ri-ji-tou-ding-you-fei-ji-fei-guo/"
  source_date: '2025-03-15'
- month: 2025-02
  text: 这次记录带给我一种新的体验：原来我认为绝不会改变的念头，也能变得这样快。
  source_title: 赶路，过年，杀猪和麻将
  source_path: "/docs/2025/02/2025-02-09-sheng-huo-ri-ji-gan-lu-guo-nian-sha-zhu-he-ma/"
  source_date: '2025-02-09'
- month: 2025-01
  text: 读书，只是生活中一件很小很小的事情，它跟篮球、游戏一样，只是我的一个小小爱好，然后碰巧，这小小爱好能够帮助我更好地认识自己，认识世界，如此而已。
  source_title: 2024年读完书籍（下）
  source_path: "/docs/2025/01/2025-01-12-zong-jie-2024-nian-du-wan-shu/"
  source_date: '2025-01-12'
- month: 2024-12
  text: 我想对自己说的是，我该在当下，像画家一样，认真对待我想要完成的每一件事，而不是常常想“以后”。
  source_title: 读完《东方马车》，我最想说的，竟然是“别常想以后”
  source_path: "/docs/2024/12/2024-12-08-yue-du-shu-mu-du-wan-dong-fang-ma-che-wo-zui/"
  source_date: '2024-12-08'
- month: 2024-11
  text: 我认为“30天计划”最核心的点，是为我们自己构造出一种信心：即相信自己也是可以坚持做到一件事情的。拥有信心之后，小事将慢慢变成大些事情。
  source_title: 看完100本书，又写完100篇读书笔记，我从中收获了些什么？
  source_path: "/docs/2024/11/2024-11-18-zong-jie-kan-wan-100-ben-shu-you/"
  source_date: '2024-11-18'
- month: 2024-10
  text: 我们其实是不太可能强迫别人做出改变的，我们每个人都有属于自己的长处，都有适合自己的生活方式，当我们于自己长处于适应中过活时，就会拥有快乐、幸福以及能量。
  source_title: 时隔两年，再见沈从文先生一面
  source_path: "/docs/2024/10/2024-10-20-yue-du-shu-mu-shi-ge-liang-nian-zai-jian-shen-cong/"
  source_date: '2024-10-20'
- month: 2024-09
  text: 记录自己当下的状态，选择最准确词语描绘此处情境，那些快乐或是郁闷，在记录当时只是我键盘下的一个个字符。
  source_title: 那个想着靠公众号挣钱并坚持周更四年的程序员现在怎么样了？
  source_path: "/docs/2024/09/2024-09-01-zong-jie-na-ge-xiang-zhe-kao-gong-zhong-hao/"
  source_date: '2024-09-01'
- month: 2024-08
  text: 我带着对陌生小姐姐与地铁站工作人员的感激，在地铁上记下捡手机这件事。
  source_title: 杭州，干净文艺又热情英气
  source_path: "/docs/2024/08/2024-08-11-sheng-huo-ri-ji-hang-zhou-gan-jing-wen-yi-you-re/"
  source_date: '2024-08-11'
- month: 2024-07
  text: 但同时，我其实是有为自己规划人生方向的，我认为读书写作然后让自己写的越来越好、内容对大众越来越有帮助，将是我持续一生的事业。
  source_title: 读《向死而生》，开复老师一场大病之后的心态转变
  source_path: "/docs/2024/07/2024-07-28-yue-du-shu-mu-du-xiang-si-er-sheng-kai-fu-lao/"
  source_date: '2024-07-28'
- month: 2024-06
  text: 阅读《真实的幸福》让我对我的相信产生怀疑，在自己文章中写下这些句子而不提供真实证据，是空洞无意义无说服力的。
  source_title: "《真实的幸福》，找一份可以将之转换为事业的工作"
  source_path: "/docs/2024/06/2024-06-16-yue-du-shu-mu-zhen-shi-de-xing-fu-zhao-yi-fen/"
  source_date: '2024-06-16'
- month: 2024-05
  text: 当我们写作时，我们是遨游在深海的鱼，是在天空滑翔的鸟，是掠过树梢的风，是自由的化身。
  source_title: "《写出我心》说，不管不顾地写就好"
  source_path: "/docs/2024/05/2024-05-06-yue-du-shu-mu-xie-chu-wo-xin-shuo-bu-guan-bu/"
  source_date: '2024-05-06'
- month: 2024-04
  text: 责任是自由的另一面，珍惜当前也是意义，珍惜，则意味着我们知道且会去完成我们生命中的那些责任，不管是好好吃饭、爱家人或者为社会做贡献。
  source_title: 活出生命的意义
  source_path: "/docs/2024/04/2024-04-28-yue-du-shu-mu-huo-chu-sheng-ming-de-yi-yi/"
  source_date: '2024-04-28'
- month: 2024-03
  text: 其次，是一种人生不会停止的希望，我坚持做的这些事情，不管四十五十甚至六十七十岁，都可以一直进行下去；我很期待看到五年十年甚至三十年后还依然做着这些事情的自己的样子。
  source_title: 坚持背单词2000天，能带来哪些改变
  source_path: "/docs/2024/03/2024-03-31-zong-jie-jian-chi-bei-dan-ci-200/"
  source_date: '2024-03-31'
- month: 2024-02
  text: 祝大家新年快乐，愿大家能常拥有自己的闲散时刻，拥有那种什么都不用想也什么都不用做的放松感受。
  source_title: 闲
  source_path: "/docs/2024/02/2024-02-12-sheng-huo-ri-ji-xian/"
  source_date: '2024-02-12'
- month: 2024-01
  text: 随着读书越多，我越发认识到自己知识的浅薄。连续阅读近三年的我变化已经很多，我真的很好奇，这样一直读书，再过两年甚至十年，我对世界对自己的认知会是怎样的。
  source_title: 2023年终总结，记一种蠢蠢欲动的迫切
  source_path: "/docs/2024/01/2024-01-01-zong-jie-2023-nian-zhong-zong-jie/"
  source_date: '2024-01-01'
- month: 2023-12
  text: 生活中，在我们感觉自己过度自律或对自己要求过高时，应该给自己多一个选择：按照直觉行事，按照自己当下的喜好做选择。
  source_title: 2023读完46本书，我最推荐的是……
  source_path: "/docs/2023/12/2023-12-31-zong-jie-2023-du-wan-46/"
  source_date: '2023-12-31'
- month: 2023-11
  text: 现阶段的我相较三年前有了些进步，但本质上依然是只会“坚持”的，坚持看书、写日常、写读书笔记，在坚持中去完善自己的认知，去更好地认识自己认识世界。
  source_title: 坚持周更公众号三年又三个月，我终于有了1000位关注
  source_path: "/docs/2023/11/2023-11-26-zong-jie-jian-chi-zhou-geng-gong-zhong-hao-san/"
  source_date: '2023-11-26'
- month: 2023-10
  text: 家庭和美，做自己喜欢做的事，拥有志同道合、情真意笃的朋友，便将拥有不留遗憾的人生。
  source_title: "《沉思录》，一个哲学皇帝对自己说的话"
  source_path: "/docs/2023/10/2023-10-29-yue-du-shu-mu-chen-si-lu-yi-ge-zhe-xue-huang/"
  source_date: '2023-10-29'
- month: 2023-09
  text: 读书，是我每天都在做的事。我心情不好，于是去找寻能够治愈自己的书，我找到好几本，最先读完的是《人生的智慧》和《高敏感人士的幸福清单》。
  source_title: "《蛤蟆先生去看心理医生》，抑郁患者的新生之路"
  source_path: "/docs/2023/09/2023-09-24-yue-du-shu-mu-ha-ma-xian-sheng-qu-kan-xin-li/"
  source_date: '2023-09-24'
- month: 2023-08
  text: 从那之后，我敢于将自己写东西的过程叫做“写作”了。这是一种心态的转变，是坚持久些能感受到自己有些进步后的自信体现。
  source_title: 逼自己作出的一篇写作小结
  source_path: "/docs/2023/08/2023-08-20-zong-jie-bi-zi-ji-zuo-chu-de-yi-pian/"
  source_date: '2023-08-20'
- month: 2023-07
  text: 如今第四个十年才刚刚开始，我已经有了明确的人生方向——一个用文字分享生活的程序员——并正在这方向上持续前行。
  source_title: 毕业十年，做个小结
  source_path: "/docs/2023/07/2023-07-30-zong-jie-bi-ye-shi-nian-zuo-ge-xiao-jie/"
  source_date: '2023-07-30'
- month: 2023-06
  text: 我认为我选择的路——一条持续完善自己技能便不用担心自己会被“35岁诅咒”所诅咒的路——是正确的。
  source_title: 读《多余的话》，记一点我与我打架
  source_path: "/docs/2023/06/2023-06-19-yue-du-shu-mu-du-duo-yu-de-hua-ji-yi-dian/"
  source_date: '2023-06-19'
- month: 2023-05
  text: 不管自己关于小孩的心理如何变化，对于小孩的成长，我一直的观点是：我要陪他一起成长。
  source_title: 在广深待8年半之后，我回重庆了
  source_path: "/docs/2023/05/2023-05-28-sheng-huo-ri-ji-zai-guang-shen-dai-8-nian-ban-zhi/"
  source_date: '2023-05-28'
- month: 2023-04
  text: 小时候切菜，老妈经常告诉我：“切完菜，菜刀全身不要伸出灶台，以免误碰到地上，掉落过程很危险；刀口要朝里，再拿的时候不给机会划到手。”这是生活中的防御性习惯。
  source_title: 读《好代码·坏代码》，理论与实践的结合
  source_path: "/docs/2023/04/2023-04-03-yue-du-shu-mu-du-hao-dai-ma-huai-dai-ma-li/"
  source_date: '2023-04-03'
- month: 2023-03
  text: 但如上所说，当我将越来越多时间用来看书，甚至于走路都用来听书时，我感觉到生活离我远了许多。
  source_title: 当前读书的困境
  source_path: "/docs/2023/03/2023-03-12-zong-jie-dang-qian-du-shu-de-kun-jing/"
  source_date: '2023-03-12'
- month: 2023-02
  text: 饭桌上各种话题继续，从父母聊到兄弟姐妹，从过去聊到未来，从生活再回工作……一切关于魏少关于我的，都聊到了。
  source_title: 有朋自远方来
  source_path: "/docs/2023/02/2023-02-19-sheng-huo-ri-ji-you-peng-zi-yuan-fang-lai/"
  source_date: '2023-02-19'
- month: 2023-01
  text: 2022年，我有了人生第一笔稿费，我上过一次报纸。我相信这是坚持的意义，是变好的标识。
  source_title: 2022，我是有好好学习的
  source_path: "/docs/2023/01/2023-01-01-zong-jie-2022-wo-shi-you-hao/"
  source_date: '2023-01-01'
- month: 2022-12
  text: 写作，是为了让自己与读者的生活更丰富；我的生活确实变得丰富许多，我正努力让您能从我的分享中获得些有价值的东西。
  source_title: 2022，读完书籍汇总
  source_path: "/docs/2022/12/2022-12-26-zong-jie-2022-du-wan-shu-ji/"
  source_date: '2022-12-26'
- month: 2022-11
  text: 我应该教你做事么？你对自己对世界的认知，应该会比我多许多？不管怎样，我是希望你回信的，我是希望你更新的。
  source_title: 40岁的我，请收信
  source_path: "/docs/2022/11/2022-11-06-sheng-huo-ri-ji-40-sui-de-wo-qing-shou-xin/"
  source_date: '2022-11-06'
- month: 2022-10
  text: 我以为，只要做好其中某一项，便能成为更好的自己，便能更好地生活；只需做好其中某一项，其它方面也将跟着进步。
  source_title: 读《软技能：代码之外的生存指南（第二版）》
