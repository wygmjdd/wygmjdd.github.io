  source_path: "/docs/2025/01/2025-01-19-zong-jie-24-nian-di-si-ji-du-bu/"
  source_date: '2025-01-19'
- month: ''
  text: 我的目标，是未来某天能像侯捷老师一样，只靠文字——能为大家带来帮助能被大家信赖的文字——便能支撑起自己的生活。
  source_title: 三年的持续阅读，我的改变
  source_path: "/docs/2023/08/2023-08-13-zong-jie-san-nian-de-chi-xu-yue-du-wo/"
  source_date: '2023-08-13'
- month: ''
  text: 对的，投身于自己热爱的事，不仅是为了追求所谓的“成就”，更是在修炼自己的生命力。
  source_title: 读《和另一个自己谈谈心》
  source_path: "/docs/2024/10/2024-10-27-du-shu-du-he-ling-yi-ge-zi-ji-tan/"
  source_date: '2024-10-27'
- month: ''
  text: 对的，我在许多时候都感受到，阿妮给予我的很好交流，是她于两米外做她自己事情时的安静陪伴。
  source_title: 一种无声陪伴
  source_path: "/docs/2025/02/2025-02-16-du-shu-yi-zhong-wu-sheng-pei-ban/"
  source_date: '2025-02-16'
- month: ''
  text: 读那些大半年前写的感恩笔记，我发现它们，竟然再一次给予我满足、感激和快乐。
  source_title: 地铁日记（第一期）
